<!DOCTYPE html>
<html lang="fr" xmlns:layout="http://www.ultraq.net.mx/thymeleaf/layout" layout:decorate="~{layouts/main}">
<head>
<title>Fiche d'un artiste</title>
</head>
<body>
<div class="container">
<div id="notification" th:replace="~{layouts/main :: notification}"></div>
<div layout:fragment="content">
<h2 th:text="|${artist.firstname} ${artist.lastname}|">Bob Sull</h2>
<div class="actions">
<a th:href="@{/artists/{id}/edit(id=${artist.id})}">Edit</a>
<form th:id="|deleteForm-${artist.id}|"
th:action="@{/artists/{id}(id=${artist.id})}"
th:method="delete">
<a href="#"
th:onclick="|if(confirm('Confirm delete artist #${artist.id}')) document.getElementById('deleteForm-${artist.id}').submit(); return false;|">Delete</a>
</form>
</div>
<section>
<h3>Types</h3>
<ul th:unless="${#lists.isEmpty(artist.types)}">
<li th:each="type : ${artist.types}">
<a th:href="@{/types/{id}(id=${type.id})}" th:text="${type.type}">Type</a>
</li>
</ul>
<p th:if="${#lists.isEmpty(artist.types)}">Aucun type lie a cet artiste.</p>
</section>
<nav><a th:href="@{/artists}">Retour à l'index</a></nav>
</div>
</div>
</body>
</html>
